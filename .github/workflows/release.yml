name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libgtest-dev

      - name: Build and test
        run: |
          cmake -S . -B build
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Amalgamate versioned header
        env:
          CLAP_VERSION: ${{ github.ref_name }}
        run: |
          python3 tools/build_single_header.py
          (cd include && sha256sum clap.hpp > clap.hpp.sha256)
          cat include/clap.hpp.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            include/clap.hpp
            include/clap.hpp.sha256
