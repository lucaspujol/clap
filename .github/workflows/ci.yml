name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  header-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify single header is up to date
        run: |
          python3 tools/build_single_header.py
          git diff --exit-code include/clap.hpp \
            || { echo "::error::include/clap.hpp is stale — rerun tools/build_single_header.py and commit"; exit 1; }

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libgtest-dev

      - name: Generate fr_FR locale
        run: sudo locale-gen fr_FR.UTF-8 && sudo update-locale

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
